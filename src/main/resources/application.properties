spring.application.name=rappi-dashboard

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Rappi}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:mini}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

data.zip.path=${DATA_ZIP_PATH:data/Archivo.zip}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:5174}


spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:gemma4:e2b}
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.chat.options.num-predict=512


spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=rappi-availability-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=SSE
spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.sse-message-endpoint=/sse/message

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.paths-to-exclude=/sse/**

server.port=8081
